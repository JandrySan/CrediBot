sonar.projectKey=JandrySan_CrediBot
sonar.sourceEncoding=UTF-8

# El backend productivo y CI usan Python 3.12.
sonar.python.version=3.12

sonar.sources=backend/app,backend/main.py,backend/Dockerfile,frontend/src,.github/workflows,supabase/migrations
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**/*.py
sonar.exclusions=**/.venv/**,**/node_modules/**,**/dist/**,**/__pycache__/**
sonar.python.coverage.reportPaths=backend/coverage.xml

# Las migraciones son un historial SQL inmutable y acumulativo. Se siguen
# analizando para seguridad, pero no representan duplicacion de codigo activo.
sonar.cpd.exclusions=supabase/migrations/**
