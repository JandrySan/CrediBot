name: Validacion backend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validar-backend:
    name: Probar backend FastAPI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    env:
      DEBUG: "false"
      DATABASE_URL: sqlite:///./credibot_test.db
      TWILIO_ENABLED: "false"
      AUDIO_STT_ENABLED: "false"
      AUDIO_REPLY_ENABLED: "false"
      TWILIO_VALIDATE_SIGNATURE: "false"
      DASHBOARD_AUTH_ENABLED: "false"
      RUN_DB_MIGRATIONS: "false"
      AUTO_CREATE_DB_SCHEMA: "true"

    steps:
      - name: Descargar codigo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Preparar Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependencias
        run: python -m pip install -r requirements-dev.txt

      - name: Validar formato y calidad estatica
        run: |
          python -m ruff format --check .
          python -m ruff check .
          python -m mypy app

      - name: Verificar sintaxis de Python
        run: python -m compileall .

      - name: Ejecutar pruebas
        run: python -m pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml
