name: Validacion frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validar-frontend:
    name: Probar build del dashboard
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Compilar frontend
        run: npm run build
