name: Despliegue backend AWS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/cd-backend-aws.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  AWS_ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY || secrets.AWS_ECR_REPOSITORY }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
  AWS_ECS_CLUSTER: ${{ vars.AWS_ECS_CLUSTER || secrets.AWS_ECS_CLUSTER }}
  AWS_ECS_SERVICE: ${{ vars.AWS_ECS_SERVICE || secrets.AWS_ECS_SERVICE }}
  AWS_ECS_CONTAINER_NAME: ${{ vars.AWS_ECS_CONTAINER_NAME || secrets.AWS_ECS_CONTAINER_NAME }}
  FRONTEND_PUBLIC_URL: ${{ vars.FRONTEND_PUBLIC_URL || secrets.FRONTEND_PUBLIC_URL }}

jobs:
  validar-backend:
    name: Validar backend antes de desplegar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    env:
      DEBUG: "false"
      DATABASE_URL: sqlite:///./credibot_test.db
      TWILIO_ENABLED: "false"
      AUDIO_STT_ENABLED: "false"
      AUDIO_REPLY_ENABLED: "false"
      TWILIO_VALIDATE_SIGNATURE: "false"
      DASHBOARD_AUTH_ENABLED: "false"
      RUN_DB_MIGRATIONS: "false"
      AUTO_CREATE_DB_SCHEMA: "true"

    steps:
      - name: Descargar codigo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Preparar Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependencias
        run: python -m pip install -r requirements-dev.txt

      - name: Validar formato y calidad estatica
        run: |
          python -m ruff format --check .
          python -m ruff check .
          python -m mypy app

      - name: Verificar sintaxis de Python
        run: python -m compileall .

      - name: Ejecutar pruebas
        run: python -m pytest --cov=app --cov-report=term-missing

  publicar-y-desplegar:
    name: Publicar imagen y actualizar ECS
    runs-on: ubuntu-latest
    needs: validar-backend
    permissions:
      contents: read
      id-token: write
    env:
      DASHBOARD_ADMIN_PASSWORD_SECRET: ${{ secrets.DASHBOARD_ADMIN_PASSWORD }}
      DASHBOARD_JWT_SECRET_SECRET: ${{ secrets.DASHBOARD_JWT_SECRET }}

    steps:
      - name: Validar configuracion requerida
        run: |
          missing=0
          for name in AWS_REGION AWS_ECR_REPOSITORY AWS_ROLE_ARN AWS_ECS_CLUSTER AWS_ECS_SERVICE FRONTEND_PUBLIC_URL DASHBOARD_ADMIN_PASSWORD_SECRET DASHBOARD_JWT_SECRET_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::$name no esta configurada en GitHub Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Descargar codigo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar credenciales AWS por OIDC
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Preparar Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Iniciar sesion en ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Validar y sincronizar secretos de aplicacion
        run: |
          for secret_id in \
            credibot/database-url \
            credibot/groq-api-key \
            credibot/twilio-account-sid \
            credibot/twilio-auth-token \
            credibot/twilio-webhook-url \
            credibot/twilio-whatsapp-from; do
            aws secretsmanager describe-secret --secret-id "$secret_id" >/dev/null
          done

          upsert_secret() {
            secret_id="$1"
            secret_value="$2"
            if aws secretsmanager describe-secret --secret-id "$secret_id" >/dev/null 2>&1; then
              aws secretsmanager put-secret-value \
                --secret-id "$secret_id" \
                --secret-string "$secret_value" >/dev/null
            else
              aws secretsmanager create-secret \
                --name "$secret_id" \
                --secret-string "$secret_value" >/dev/null
            fi
          }

          upsert_secret credibot/dashboard-admin-password "$DASHBOARD_ADMIN_PASSWORD_SECRET"
          upsert_secret credibot/dashboard-jwt-secret "$DASHBOARD_JWT_SECRET_SECRET"

      - name: Validar o crear repositorio ECR
        run: |
          aws ecr describe-repositories --repository-names "$AWS_ECR_REPOSITORY" >/dev/null 2>&1 \
            || aws ecr create-repository \
              --repository-name "$AWS_ECR_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 >/dev/null

      - name: Construir y publicar imagen
        id: imagen
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:latest

      - name: Aplicar migraciones a la base productiva
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          DATABASE_URL=$(aws secretsmanager get-secret-value \
            --secret-id credibot/database-url \
            --query SecretString \
            --output text)

          docker run --rm \
            --env DATABASE_URL="$DATABASE_URL" \
            --env RUN_DB_MIGRATIONS=true \
            "$IMAGE_URI" \
            python -m alembic upgrade head

          unset DATABASE_URL

      - name: Preparar nueva task definition
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          SERVICE_JSON=$(aws ecs describe-services \
            --cluster "$AWS_ECS_CLUSTER" \
            --services "$AWS_ECS_SERVICE")

          TASK_DEFINITION_ARN=$(echo "$SERVICE_JSON" | jq -r '.services[0].taskDefinition')
          if [ -z "$TASK_DEFINITION_ARN" ] || [ "$TASK_DEFINITION_ARN" = "null" ]; then
            echo "::error::No se pudo resolver la task definition activa del servicio ECS."
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION_ARN" \
            --query taskDefinition > task-definition.json

          DATABASE_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/database-url --query ARN --output text)
          GROQ_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/groq-api-key --query ARN --output text)
          TWILIO_SID_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/twilio-account-sid --query ARN --output text)
          TWILIO_TOKEN_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/twilio-auth-token --query ARN --output text)
          TWILIO_WEBHOOK_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/twilio-webhook-url --query ARN --output text)
          TWILIO_FROM_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/twilio-whatsapp-from --query ARN --output text)
          DASHBOARD_PASSWORD_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/dashboard-admin-password --query ARN --output text)
          DASHBOARD_JWT_SECRET_ARN=$(aws secretsmanager describe-secret --secret-id credibot/dashboard-jwt-secret --query ARN --output text)

          CONTAINER_NAME="$AWS_ECS_CONTAINER_NAME"
          if [ -z "$CONTAINER_NAME" ]; then
            CONTAINER_COUNT=$(jq '.containerDefinitions | length' task-definition.json)
            if [ "$CONTAINER_COUNT" -ne 1 ]; then
              echo "::error::La task definition tiene mas de un contenedor. Configura AWS_ECS_CONTAINER_NAME."
              exit 1
            fi
            CONTAINER_NAME=$(jq -r '.containerDefinitions[0].name' task-definition.json)
          fi

          jq \
            --arg IMAGE "$IMAGE_URI" \
            --arg NAME "$CONTAINER_NAME" \
            --arg DATABASE_SECRET_ARN "$DATABASE_SECRET_ARN" \
            --arg GROQ_SECRET_ARN "$GROQ_SECRET_ARN" \
            --arg TWILIO_SID_SECRET_ARN "$TWILIO_SID_SECRET_ARN" \
            --arg TWILIO_TOKEN_SECRET_ARN "$TWILIO_TOKEN_SECRET_ARN" \
            --arg TWILIO_WEBHOOK_SECRET_ARN "$TWILIO_WEBHOOK_SECRET_ARN" \
            --arg TWILIO_FROM_SECRET_ARN "$TWILIO_FROM_SECRET_ARN" \
            --arg DASHBOARD_PASSWORD_SECRET_ARN "$DASHBOARD_PASSWORD_SECRET_ARN" \
            --arg DASHBOARD_JWT_SECRET_ARN "$DASHBOARD_JWT_SECRET_ARN" '
            def remove_named($names):
              map(select(.name as $name | ($names | index($name) | not)));

            def configure_container:
              [
                "APP_NAME", "SUPABASE_DATABASE_URL", "DB_HOST", "DB_PORT",
                "DB_NAME", "DB_USER", "DB_PASSWORD", "TWILIO_WHATSAPP_NUMBER",
                "AUDIO_STT_LANGUAGE", "AUDIO_REPLY_LANGUAGE",
                "AUDIO_REPLY_PUBLIC_BASE_URL", "DASHBOARD_ADMIN_PASSWORD",
                "DASHBOARD_JWT_SECRET", "DASHBOARD_ADMIN_USERNAME",
                "DASHBOARD_ADVISOR_USERNAME", "DASHBOARD_ADVISOR_PASSWORD",
                "TWILIO_ENABLED",
                "TWILIO_VALIDATE_SIGNATURE", "DASHBOARD_AUTH_ENABLED",
                "RUN_DB_MIGRATIONS", "AUTO_CREATE_DB_SCHEMA", "AUDIO_REPLY_ENABLED"
              ] as $managed_env
              | [
                  "DATABASE_URL", "SUPABASE_DATABASE_URL", "GROQ_API_KEY",
                  "TWILIO_ACCOUNT_SID", "TWILIO_AUTH_TOKEN", "TWILIO_WEBHOOK_URL",
                  "TWILIO_WHATSAPP_FROM", "TWILIO_WHATSAPP_NUMBER",
                  "DASHBOARD_ADMIN_PASSWORD", "DASHBOARD_JWT_SECRET",
                  "DASHBOARD_ADVISOR_USERNAME", "DASHBOARD_ADVISOR_PASSWORD"
                ] as $managed_secrets
              | .environment = ((.environment // []) | remove_named($managed_env))
              | .environment += [
                  {"name": "TWILIO_ENABLED", "value": "true"},
                  {"name": "TWILIO_VALIDATE_SIGNATURE", "value": "true"},
                  {"name": "DASHBOARD_AUTH_ENABLED", "value": "true"},
                  {"name": "DASHBOARD_ADMIN_USERNAME", "value": "admin"},
                  {"name": "RUN_DB_MIGRATIONS", "value": "true"},
                  {"name": "AUTO_CREATE_DB_SCHEMA", "value": "false"},
                  {"name": "AUDIO_REPLY_ENABLED", "value": "true"}
                ]
              | .secrets = ((.secrets // []) | remove_named($managed_secrets))
              | .secrets += [
                  {"name": "DATABASE_URL", "valueFrom": $DATABASE_SECRET_ARN},
                  {"name": "GROQ_API_KEY", "valueFrom": $GROQ_SECRET_ARN},
                  {"name": "TWILIO_ACCOUNT_SID", "valueFrom": $TWILIO_SID_SECRET_ARN},
                  {"name": "TWILIO_AUTH_TOKEN", "valueFrom": $TWILIO_TOKEN_SECRET_ARN},
                  {"name": "TWILIO_WEBHOOK_URL", "valueFrom": $TWILIO_WEBHOOK_SECRET_ARN},
                  {"name": "TWILIO_WHATSAPP_FROM", "valueFrom": $TWILIO_FROM_SECRET_ARN},
                  {"name": "DASHBOARD_ADMIN_PASSWORD", "valueFrom": $DASHBOARD_PASSWORD_SECRET_ARN},
                  {"name": "DASHBOARD_JWT_SECRET", "valueFrom": $DASHBOARD_JWT_SECRET_ARN}
                ];

            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | (.containerDefinitions[] | select(.name == $NAME) | .image) = $IMAGE
            | (.containerDefinitions[] | select(.name == $NAME)) |= configure_container
          ' task-definition.json > nueva-task-definition.json

      - name: Registrar task definition
        id: task
        run: |
          TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://nueva-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=$TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Actualizar servicio ECS
        run: |
          aws ecs update-service \
            --cluster "$AWS_ECS_CLUSTER" \
            --service "$AWS_ECS_SERVICE" \
            --task-definition "${{ steps.task.outputs.arn }}" >/dev/null

          aws ecs wait services-stable \
            --cluster "$AWS_ECS_CLUSTER" \
            --services "$AWS_ECS_SERVICE"

      - name: Verificar produccion
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "$FRONTEND_PUBLIC_URL/health" >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "::error::El health check publico no respondio correctamente."
              exit 1
            fi
            sleep 10
          done

          AUTH_CONFIG=$(curl --fail --silent --show-error "$FRONTEND_PUBLIC_URL/api/auth/config")
          echo "$AUTH_CONFIG" | jq -e '.enabled == true' >/dev/null

          LOGIN_PAYLOAD=$(jq -nc \
            --arg username admin \
            --arg password "$DASHBOARD_ADMIN_PASSWORD_SECRET" \
            '{username: $username, password: $password}')
          LOGIN_RESPONSE=$(curl --fail --silent --show-error \
            --header 'Content-Type: application/json' \
            --data "$LOGIN_PAYLOAD" \
            "$FRONTEND_PUBLIC_URL/api/auth/token")
          echo "$LOGIN_RESPONSE" | jq -e '.access_token | length > 20' >/dev/null

          WEBHOOK_STATUS=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --data 'From=whatsapp%3A%2B593000000000&Body=security-check' \
            "$FRONTEND_PUBLIC_URL/webhook/whatsapp")
          test "$WEBHOOK_STATUS" = "403"

      - name: Programar eliminacion de secret obsoleto
        run: |
          if aws secretsmanager describe-secret \
            --secret-id credibot/twilio-whatsapp-number >/dev/null 2>&1; then
            aws secretsmanager delete-secret \
              --secret-id credibot/twilio-whatsapp-number \
              --recovery-window-in-days 7 >/dev/null \
              || echo "::warning::No se pudo programar la eliminacion del secret heredado."
          fi

      - name: Resumen del despliegue
        run: |
          {
            echo "## Despliegue backend"
            echo ""
            echo "- Imagen: \`${{ steps.ecr.outputs.registry }}/${AWS_ECR_REPOSITORY}:${GITHUB_SHA}\`"
            echo "- Cluster ECS: \`${AWS_ECS_CLUSTER}\`"
            echo "- Servicio ECS: \`${AWS_ECS_SERVICE}\`"
            echo "- Task definition: \`${{ steps.task.outputs.arn }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
